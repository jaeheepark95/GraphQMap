# GraphQMap — Unsupervised (Stage 2 only) sanity check configuration
# Goal: verify surrogate losses decrease on randomly initialized model

model:
  embedding_dim: 64

  circuit_gnn:
    node_features:
      - gate_count
      - two_qubit_gate_count
      - single_qubit_gate_ratio
      - critical_path_fraction
    rwpe_k: 2
    edge_input_dim: 3
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  hardware_gnn:
    node_input_dim: 5
    edge_input_dim: 1
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  cross_attention:
    num_layers: 2
    num_heads: 4
    ffn_hidden_dim: 128
    dropout: 0.1

  score_head:
    d_k: 64

sinkhorn:
  tau: 0.05
  schedule: fixed
  max_iter: 20
  tolerance: 1.0e-6

training:
  stage: 2
  optimizer:
    type: adamw
    lr: 5.0e-4
    weight_decay: 1.0e-4
  scheduler:
    type: cosine_annealing
    T_max: 30
    eta_min: 1.0e-6
  warmup_epochs: 2
  max_epochs: 30
  early_stopping:
    monitor: val_pst
    patience: 10
    min_delta: 0.005
  pst_validation:
    interval: 10
    num_circuits: 10
    convergence_checks: 3

loss:
  type: surrogate
  components:
    - name: error_distance
      weight: 1.0
    - name: node_quality
      weight: 0.1


data:
  circuit_dirs:
    - data/circuits/queko
    - data/circuits/qasmbench
  normalization:
    epsilon: 1.0e-8

batching:
  max_total_nodes: 512
  backend_balanced: true

backends:
  training:
    - FakeManila
    - FakeGuadalupe
    - FakeMontreal

seed: 42
device: cuda
num_workers: 0
log_dir: logs/unsupervised_test
checkpoint_dir: checkpoints/unsupervised_test
