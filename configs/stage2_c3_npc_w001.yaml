# Stage 2: C3 piecewise adj (best) + node_placement_cost (weight 0.01)
# Base: stage2_sinkhorn_adj_sizeaware.yaml (C3 confirmed best, avg 0.671)
# Change: + L_npc(0.01, lambda_r=1.0)
#
# L_total = L_surr(1.0) + L_adj_sizeaware(0.3/0.5/1.0) + L_npc(0.01)

model:
  embedding_dim: 64

  circuit_gnn:
    node_features:
      - gate_count
      - two_qubit_gate_count
      - single_qubit_gate_ratio
      - critical_path_fraction
    rwpe_k: 2
    edge_input_dim: 3
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  hardware_gnn:
    node_input_dim: 5
    edge_input_dim: 1
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  cross_attention:
    num_layers: 2
    num_heads: 4
    ffn_hidden_dim: 128
    dropout: 0.1

  score_head:
    d_k: 64
    noise_bias_dim: 0

sinkhorn:
  score_norm: sinkhorn
  tau_max: 1.0
  tau_min: 0.05
  schedule: exponential
  max_iter: 20
  tolerance: 1.0e-6

training:
  stage: 2
  optimizer:
    type: adamw
    lr: 5.0e-4
    weight_decay: 1.0e-4
  scheduler:
    type: cosine_annealing
    T_max: 100
    eta_min: 1.0e-5
  warmup_epochs: 2
  grad_clip_norm: 2.0
  max_epochs: 100
  early_stopping:
    monitor: val_pst
    patience: 10
    min_delta: 0.005
  pst_validation:
    interval: 5
    num_circuits: 200
    convergence_checks: 3

loss:
  type: surrogate
  components:
    - name: error_distance
      weight: 1.0
    - name: adjacency_size_aware
      weight: 1.0
      params:
        weight_small: 0.3
        weight_medium: 0.5
        weight_large: 1.0
        threshold_small: 40
        threshold_large: 80
    - name: node_placement_cost
      weight: 0.01
      params:
        lambda_r: 1.0

data:
  data_root: data/circuits
  splits:
    train: data/circuits/splits/stage2_all.json
    val: data/circuits/splits/val.json
  multi_programming:
    scenarios: [1, 2, 4]
    proportions: [0.5, 0.3, 0.2]
    occupancy_min: 0.3
    occupancy_max: 0.75
  normalization:
    epsilon: 1.0e-8

batching:
  max_total_nodes: 512
  backend_balanced: true
  large_backend_boost: 2.0

backends:
  training:
    - FakeAthens
    - FakeBelem
    - FakeBogota
    - FakeBurlington
    - FakeEssex
    - FakeLima
    - FakeLondon
