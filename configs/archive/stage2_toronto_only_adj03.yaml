# Stage 2: Single-backend (Toronto only) experiment — L_adj weight 0.3
# Hypothesis: Fixed backend eliminates backend rotation noise, improves convergence

model:
  embedding_dim: 64

  circuit_gnn:
    node_features:
      - gate_count
      - two_qubit_gate_count
      - single_qubit_gate_ratio
      - critical_path_fraction
    rwpe_k: 2
    edge_input_dim: 3
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  hardware_gnn:
    node_input_dim: 5
    edge_input_dim: 1
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  cross_attention:
    num_layers: 2
    num_heads: 4
    ffn_hidden_dim: 128
    dropout: 0.1

  score_head:
    d_k: 64
    noise_bias_dim: 0

sinkhorn:
  score_norm: sinkhorn
  tau_max: 1.0
  tau_min: 0.05
  schedule: exponential
  max_iter: 20
  tolerance: 1.0e-6

training:
  optimizer:
    type: adamw
    lr: 5.0e-4
    weight_decay: 1.0e-4
  scheduler:
    type: cosine_annealing
    T_max: 100
    eta_min: 1.0e-5
  warmup_epochs: 2
  grad_clip_norm: 2.0

  max_epochs: 100
  early_stopping:
    monitor: val_pst
    patience: 10
    min_delta: 0.005

  pst_validation:
    interval: 5
    num_circuits: 200
    convergence_checks: 3

loss:
  type: surrogate
  components:
    - name: error_distance
      weight: 1.0
    - name: adjacency
      weight: 0.3

data:
  data_root: data/circuits
  splits:
    train: data/circuits/splits/stage2_all.json

  multi_programming:
    scenarios: [1, 2, 4]
    proportions: [0.5, 0.3, 0.2]
    occupancy_min: 0.3
    occupancy_max: 0.75

  normalization:
    epsilon: 1.0e-8

batching:
  max_total_nodes: 512
  backend_balanced: true
  large_backend_boost: 1.0    # single backend, no boost needed

backends:
  training:
    - FakeToronto            # 27Q — single backend experiment
  validation:
    - FakeMumbai             # 27Q — same size class as Toronto
  test:
    - FakeToronto
    - FakeRochester
    - FakeWashington

seed: 42
device: cuda
num_workers: 4
log_dir: logs/stage2
checkpoint_dir: checkpoints/stage2
