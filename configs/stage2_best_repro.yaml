    - FakeToronto            # 27Q
    - FakeBrooklyn           # 65Q
    - FakeTorino             # 133Q

# ---- Misc ----
seed: 42
device: cuda
num_workers: 4
log_dir: logs/stage2
checkpoint_dir: checkpoints/stage2
