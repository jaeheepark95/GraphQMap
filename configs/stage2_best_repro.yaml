    - FakeOslo
    - FakePerth
    # 15-16Q
    - FakeMelbourne
    - FakeGuadalupe
    # 20Q
    - FakeAlmaden
    - FakeBoeblingen
    - FakeJohannesburg
    - FakePoughkeepsie
    - FakeSingapore
    # 27-28Q (Mumbai held out → validation)
    - FakeAlgiers
    - FakeAuckland
    - FakeCairo
