# GraphQMap Stage 1: Supervised Pre-training Configuration

# ---- Model Architecture ----
model:
  embedding_dim: 64

  circuit_gnn:
    # Node features: select from registry (gate_count, two_qubit_gate_count, degree,
    #   depth_participation, weighted_degree, single_qubit_gate_ratio, critical_path_fraction)
    # Diagnose before training: python scripts/diagnose_features.py --config configs/stage1.yaml
    node_features:
      - gate_count
      - two_qubit_gate_count
      - single_qubit_gate_ratio
      - critical_path_fraction
    rwpe_k: 2                  # Random Walk PE steps (0 = disabled)
    # node_input_dim is auto-computed: len(node_features) + rwpe_k = 6
    edge_input_dim: 3          # interaction_count, earliest, latest
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]    # 1-indexed

  hardware_gnn:
    node_input_dim: 6        # readout_err, sq_err, degree, t1_cx_ratio, t2_cx_ratio
    edge_input_dim: 2        # cx_error
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  cross_attention:
    num_layers: 2
    num_heads: 4
    ffn_hidden_dim: 128      # 2 * embedding_dim
    dropout: 0.1

  score_head:
    d_k: 64

# ---- Sinkhorn ----
sinkhorn:
  tau_max: 1.0
  tau_min: 0.05
  schedule: exponential      # tau(epoch) = tau_max * (tau_min/tau_max)^(epoch/total_epochs)
  max_iter: 20
  tolerance: 1.0e-6

# ---- Training ----
training:
  stage: 1
  optimizer:
    type: adamw
    lr: 1.0e-3
    weight_decay: 1.0e-4
  scheduler:
    type: cosine_annealing
    T_max: 100               # will be overridden by actual epoch count
    eta_min: 1.0e-6

  # MLQD + QUEKO main phase
  mlqd_queko:
    max_epochs: 100
    early_stopping:
      monitor: val_ce_loss
      patience: 15
      min_delta: 1.0e-4

  # QUEKO-only fine-tuning phase (high-quality τ⁻¹ optimal labels)
  queko:
    max_epochs: 50
    lr_factor: 0.1           # reduce LR to 1/10
    early_stopping:
      monitor: val_ce_loss
      patience: 10
      min_delta: 1.0e-4

# ---- Loss ----
loss:
  type: cross_entropy        # L_sup = -sum Y_ij * log(P_ij)

# ---- Data ----
data:
  data_root: data/circuits
  splits:
    train: data/circuits/splits/stage1_supervised.json
    val: data/circuits/splits/val.json
    queko_train: data/circuits/splits/stage1_queko_only.json
    queko_val: data/circuits/splits/val_queko_only.json

  multi_programming:
    scenarios: [1, 2, 4]           # number of circuits per group (configurable)
    proportions: [0.5, 0.3, 0.2]   # sampling ratio per scenario
    occupancy_min: 0.3
    occupancy_max: 0.75

  normalization:
    epsilon: 1.0e-8          # for zero std deviation

# ---- Batching ----
batching:
  max_total_nodes: 512       # total physical qubits per batch
  backend_balanced: true     # equal backend frequency per epoch

# ---- Hardware Backends (Training) ----
