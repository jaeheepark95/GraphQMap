# GraphQMap Stage 1: Supervised Pre-training Configuration

# ---- Model Architecture ----
model:
  embedding_dim: 64

  circuit_gnn:
    node_input_dim: 4        # 4 local features (gate_count, 2q_count, degree, depth_participation)
    edge_input_dim: 3        # interaction_count, earliest, latest
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]  # 1-indexed

  hardware_gnn:
    node_input_dim: 6        # T1, T2, freq, readout_err, sq_err, degree
    edge_input_dim: 2        # cx_error, cx_duration
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  cross_attention:
    num_layers: 2
    num_heads: 4
    ffn_hidden_dim: 128      # 2 * embedding_dim
    dropout: 0.1

  score_head:
    d_k: 64

# ---- Sinkhorn ----
sinkhorn:
  tau_max: 1.0
  tau_min: 0.05
  schedule: exponential      # tau(epoch) = tau_max * (tau_min/tau_max)^(epoch/total_epochs)
  max_iter: 20
  tolerance: 1.0e-6

# ---- Training ----
training:
  stage: 1
  optimizer:
    type: adamw
    lr: 1.0e-3
    weight_decay: 1.0e-4
  scheduler:
    type: cosine_annealing
    T_max: 100               # will be overridden by actual epoch count
    eta_min: 1.0e-6

  # MLQD + QUEKO main phase
  mlqd_queko:
    max_epochs: 100
    early_stopping:
      monitor: val_ce_loss
      patience: 10
      min_delta: 1.0e-4

  # QUEKO-only fine-tuning phase (high-quality τ⁻¹ optimal labels)
  queko:
    max_epochs: 50
    lr_factor: 0.1           # reduce LR to 1/10
    early_stopping:
      monitor: val_ce_loss
      patience: 5
      min_delta: 1.0e-4

# ---- Loss ----
loss:
  type: cross_entropy        # L_sup = -sum Y_ij * log(P_ij)

# ---- Data ----
data:
  data_root: data/circuits
  splits:
    train: data/circuits/splits/stage1_supervised.json
    val: data/circuits/splits/val.json
    queko_train: data/circuits/splits/stage1_queko_only.json
    queko_val: data/circuits/splits/val_queko_only.json

  multi_programming:
    ratios:
      single: 0.5
      dual: 0.3
      quad: 0.2
    occupancy_min: 0.3
    occupancy_max: 0.75

  normalization:
    epsilon: 1.0e-8          # for zero std deviation

# ---- Batching ----
batching:
  max_total_nodes: 512       # total physical qubits per batch
  backend_balanced: true     # equal backend frequency per epoch

