    - FakeCusco
    - FakeKawasaki
    - FakeKyiv
    - FakeKyoto
    - FakeOsaka
    - FakeQuebec
    - FakeSherbrooke
    # Held-out: Mumbai (27Q), Manhattan (65Q), Washington (127Q) → validation
    # Synthetic backends (QUEKO + MLQD)
    - queko_aspen4           # 16Q
    - queko_tokyo            # 20Q
    - queko_rochester        # 53Q
    - queko_sycamore         # 54Q
    - mlqd_grid5x5           # 25Q
  validation:
    # Held-out from training pool for unbiased PST checkpoint selection.
    # Size-matched to test backends; never seen in training data.
    - FakeMumbai             # 27Q,  Falcon r5.11 — Toronto match
    - FakeManhattan          # 65Q,  Hummingbird r2 — Brooklyn match
    - FakeWashington         # 127Q, Eagle (cx) — Torino size match
  test:
    - FakeToronto            # 27Q
    - FakeBrooklyn           # 65Q
    - FakeTorino             # 133Q

# ---- Misc ----
seed: 42
device: cuda
num_workers: 4
# log_dir and checkpoint_dir are auto-set by train.py (runs/stage{N}/TIMESTAMP_NAME/)
log_dir: logs/stage1           # fallback only; overridden at runtime
checkpoint_dir: checkpoints/stage1  # fallback only; overridden at runtime
