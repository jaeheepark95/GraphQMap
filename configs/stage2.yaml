    - FakeQuito
    - FakeRome
    - FakeSantiago
    - FakeValencia
    - FakeVigo
    - FakeYorktown
    # 7Q
    - FakeCasablanca
    - FakeJakarta
    - FakeLagos
    - FakeNairobi
    - FakeOslo
    - FakePerth
    # 15-16Q
    - FakeMelbourne
    - FakeGuadalupe
    # 20Q
    - FakeAlmaden
    - FakeBoeblingen
    - FakeJohannesburg
    - FakePoughkeepsie
    - FakeSingapore
    # 27-28Q
    - FakeAlgiers
    - FakeAuckland
    - FakeCairo
    - FakeCambridge
    - FakeGeneva
    - FakeHanoi
    - FakeKolkata
    - FakeMontreal
    - FakeParis
    - FakePeekskill
    - FakeSydney
    # 33Q
    - FakePrague
    # 53Q
    - FakeBrooklyn
    # 127Q
    - FakeBrisbane
    - FakeCusco
    - FakeKawasaki
    - FakeKyiv
    - FakeKyoto
    - FakeOsaka
    - FakeQuebec
    - FakeSherbrooke
    - FakeTorino
    # NOTE: Synthetic backends (queko_*, mlqd_*) are Stage 1 only.
    # Stage 2 uses 52 real Qiskit backends; QUEKO/MLQD circuits are
    # randomly re-assigned to real backends at data load time.
    # Held-out: Mumbai (27Q), Manhattan (65Q) → validation
  validation:
    # Held-out from training pool for unbiased PST checkpoint selection.
    # Size-matched to test backends; never seen in training data.
    - FakeMumbai             # 27Q,  Falcon r5.11 — Toronto match
    - FakeManhattan          # 65Q,  Hummingbird r2 — Brooklyn match
  test:
    - FakeToronto            # 27Q
    - FakeRochester           # 53Q
    - FakeWashington             # 127Q

# ---- Misc ----
seed: 42
device: cuda
num_workers: 4
# log_dir and checkpoint_dir are auto-set by train.py (runs/stage{N}/TIMESTAMP_NAME/)
log_dir: logs/stage2           # fallback only; overridden at runtime
checkpoint_dir: checkpoints/stage2  # fallback only; overridden at runtime
# pretrained_checkpoint: specify via --override pretrained_checkpoint=runs/stage1/<RUN>/checkpoints/best.pt
