# GraphQMap Stage 2: Noise-Aware Surrogate Metric Fine-tuning Configuration

# ---- Model Architecture ----
# Inherits from stage1; only overrides are listed here.
# Config loader merges stage2 on top of stage1 defaults.
model:
  embedding_dim: 64

  circuit_gnn:
    # Node features: select from registry (gate_count, two_qubit_gate_count, degree,
    #   depth_participation, weighted_degree, single_qubit_gate_ratio, critical_path_fraction)
    # Diagnose before training: python scripts/diagnose_features.py --config configs/stage2.yaml
    node_features:
      - gate_count
      - two_qubit_gate_count
      - single_qubit_gate_ratio
      - critical_path_fraction
    rwpe_k: 2                  # Random Walk PE steps (0 = disabled)
    # node_input_dim is auto-computed: len(node_features) + rwpe_k = 6
    edge_input_dim: 3
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  hardware_gnn:
    node_input_dim: 6        # readout_err, sq_err, degree, t1_cx_ratio, t2_cx_ratio
    edge_input_dim: 2        # cx_error
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  cross_attention:
    num_layers: 2
    num_heads: 4
    ffn_hidden_dim: 128
    dropout: 0.1

  score_head:
    d_k: 64
    noise_bias_dim: 0          # disabled: Hardware GNN is sole path to score matrix

# ---- Sinkhorn ----
sinkhorn:
  tau_max: 1.0               # start soft for gradient flow
  tau_min: 0.05              # final sharp temperature
  schedule: exponential      # exponential decay from tau_max to tau_min
  max_iter: 20
  tolerance: 1.0e-6

# ---- Training ----
training:
  stage: 2
  optimizer:
    type: adamw
    lr: 5.0e-4
    weight_decay: 1.0e-4
  scheduler:
    type: cosine_annealing
    T_max: 100
    eta_min: 1.0e-5
  warmup_epochs: 2
  grad_clip_norm: 2.0

  max_epochs: 100
  early_stopping:
    monitor: val_pst             # not used for early stopping; kept for config compatibility
    patience: 10
    min_delta: 0.005

  # PST validation schedule (used for best checkpoint selection, no early stopping)
  pst_validation:
    interval: 5               # measure every N epochs; best PST checkpoint saved
    num_circuits: 200          # representative circuits for validation
    convergence_checks: 3      # stop if N consecutive < min_delta

# ---- Loss ----
# Components are registered loss modules. Add/remove/reorder freely.
# Each component: name (from registry), weight (multiplier in total loss).
# Available: error_distance, adjacency, hop_distance, node_quality, separation
loss:
  type: surrogate
  components:
    - name: error_distance       # L_surr: error-weighted shortest path distance (primary)
      weight: 1.0
    - name: node_quality         # L_node: NISQ node quality (bounded [-1,0])
      weight: 0.3


# ---- Data ----
data:
  data_root: data/circuits
  splits:
    train: data/circuits/splits/stage2_all.json

  multi_programming:
    scenarios: [1, 2, 4]           # number of circuits per group (configurable)
    proportions: [0.5, 0.3, 0.2]   # sampling ratio per scenario
    occupancy_min: 0.3
    occupancy_max: 0.75

  normalization:
    epsilon: 1.0e-8

# ---- Batching ----
batching:
  max_total_nodes: 512
  backend_balanced: true
  large_backend_boost: 2.0    # oversample 50Q+ backends by this factor

# ---- Hardware Backends ----
backends:
