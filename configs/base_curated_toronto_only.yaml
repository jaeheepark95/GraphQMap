# GraphQMap: Curated-dataset base config (2026-04-15)
#
# Purpose: New default training setup after pozzi_train12 experiments.
# - Dataset: train_curated.json (183 circuits: revlib 113 + qasmbench 39 + mqt_bench 15 + mlqd 11 + queko 5)
# - Training backends: 14 (7×27Q cx + 2×65Q cx + 5×127Q ecr), size-matched to test
# - Validation: Paris(27Q cx) + Torino(133Q cz) — held-out, not in training
# - Test: Toronto(27Q) + Rochester(53Q) + Washington(127Q)
#
# Design notes:
# - 127Q cx-only has just one backend (Washington, held for test), so ecr 127Q is
#   unavoidable. Model is gate-agnostic (coupling_map + z-scored 2q_error only).
# - Rochester(53Q) has single_qubit_error ALL ZERO; kept out of training backends.
# - Prague(33Q cz) reserved for zero-shot gate-agnostic sanity check at eval time.

# ---- Model Architecture ----
model:
  embedding_dim: 64

  circuit_gnn:
    node_features:
      - gate_count
      - two_qubit_gate_count
      - single_qubit_gate_ratio
      - critical_path_fraction
    rwpe_k: 2
    edge_input_dim: 3
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  hardware_gnn:
    node_input_dim: 5            # hw_feat_v1: readout_err, sq_err, degree, t1_cx_ratio, t2_cx_ratio
    edge_input_dim: 1            # 2q_gate_error only
    num_layers: 3
    num_heads: 4
    activation: elu
    dropout: 0.1
    use_batchnorm: true
    residual_layers: [2, 3]

  cross_attention:
    num_layers: 2
    num_heads: 4
    ffn_hidden_dim: 128
    dropout: 0.1

  score_head:
    d_k: 64
    noise_bias_dim: 0

  iterative_refinement:
    iterations: 0
    lambda_init: 1.0
    beta: 0.9

# ---- Score normalization ----
sinkhorn:
  score_norm: sinkhorn
  schedule: exponential
  tau_max: 1.0
  tau_min: 0.05
  max_iter: 20
  tolerance: 1.0e-6

# ---- Training ----
training:
  optimizer:
    type: adamw
    lr: 5.0e-4
    weight_decay: 1.0e-4
  scheduler:
    type: cosine_annealing
    T_max: 100
    eta_min: 1.0e-5
  warmup_epochs: 2
  grad_clip_norm: 2.0

  max_epochs: 100
  early_stopping:
    monitor: val_pst
    patience: 10
    min_delta: 0.005

  pst_validation:
    interval: 5
    num_circuits: 200
    convergence_checks: 3
    circuit_set: test2           # 2nd Pozzi test set (13 circuits)

# ---- Loss ----
# Baseline: QAP fidelity loss only (tr(A_c P C_eff P^T))
loss:
  type: surrogate
  components:
    - name: qap_fidelity
      weight: 1.0
      params:
        normalize: true

# ---- Data ----
data:
  data_root: data/circuits
  splits:
    train: data/circuits/splits/train_curated_toronto.json
    val: data/circuits/splits/train_curated_toronto.json

  multi_programming:
    scenarios: [1]
    proportions: [1.0]
    occupancy_min: 0.3
    occupancy_max: 0.75

  normalization:
    epsilon: 1.0e-8

# ---- Batching ----
batching:
  max_total_nodes: 512
  backend_balanced: true
  large_backend_boost: 1.0        # Option 1: no 50Q+ oversampling (was 2.0)

# ---- Hardware Backends (Toronto-only training variant) ----
# Upper-bound experiment: train directly on test target Toronto (27Q cx).
# Intentional train=test overlap on Toronto; Rochester/Washington measure no-generalization extent.
backends:
  training:
    - FakeToronto                # 27Q cx — ONLY training backend
  validation:
    - FakeParis                  # 27Q cx — held-out proxy
  test:
    - FakeToronto                # 27Q cx (train=test by design)
    - FakeRochester              # 53Q cx
    - FakeWashington             # 127Q cx

# ---- Misc ----
seed: 42
device: cuda
num_workers: 4
log_dir: logs/train
checkpoint_dir: checkpoints/train
